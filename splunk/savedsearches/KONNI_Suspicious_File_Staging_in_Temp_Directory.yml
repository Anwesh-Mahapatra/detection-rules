rule_title: KONNI Suspicious File Staging in Temp Directory
rule_id: no-id
rule_level: medium
mitre_attack:
- attack.initial_access
- attack.defense_evasion
- attack.t1566.002
- attack.t1140
description: 'Detects creation of suspicious files (.lnk, .cab, .ps1) inside a newly
  created subdirectory under %TEMP%, consistent with KONNI initial access lure delivery
  and payload staging.

  '
spl_query: index="sysmon" source="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
  EventCode=11 TargetFilename="*\\AppData\\Local\\Temp\\*" (TargetFilename="*.lnk"
  OR TargetFilename="*.cab" OR TargetFilename="*.ps1")
source_sigma_file: .\rules\Apt-Konni\KONNI Suspicious File Staging in Temp Directory.yml
converted_at: '2026-04-05T15:08:04.554736+00:00'
