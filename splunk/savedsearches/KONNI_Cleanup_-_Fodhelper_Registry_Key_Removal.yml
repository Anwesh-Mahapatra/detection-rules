rule_title: KONNI Cleanup - Fodhelper Registry Key Removal
rule_id: no-id
rule_level: medium
mitre_attack:
- attack.defense_evasion
- attack.t1070.004
description: 'Detects deletion of the ms-settings registry key hierarchy and scheduled
  task removal in quick succession, consistent with KONNI post-exploitation cleanup
  to remove UAC bypass artifacts.

  '
spl_query: index="sysmon" source="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
