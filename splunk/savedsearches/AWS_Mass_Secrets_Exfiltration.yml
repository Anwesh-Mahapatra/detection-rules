rule_title: AWS Mass Secrets Exfiltration (Smash and Grab)
rule_id: aws-cloudtrail-mass-secrets-exfil
rule_level: critical
mitre_attack:
- attack.credential_access
- attack.exfiltration
- attack.t1528
- attack.t1552
description: Detects an AWS identity rapidly accessing a high volume of unique Secrets Manager or SSM Parameter Store credentials within a short timeframe, indicating automated exfiltration.
spl_query: >
  index="aws" sourcetype="aws:cloudtrail" (eventName="GetSecretValue" OR eventName="BatchGetSecretValue" OR eventName="GetParameters" OR eventName="GetParameter")
  | fillnull value="none" requestParameters.secretId, requestParameters.name
  | stats count as total_calls, dc(requestParameters.secretId) as unique_secrets, dc(requestParameters.name) as unique_params, values(eventName) as actions by userIdentity.arn, sourceIPAddress, userAgent
  | eval total_unique_stolen = unique_secrets + unique_params
  | where total_unique_stolen > 3 OR total_calls > 20
source_sigma_file: rules/AWS/Mass_Secrets_Exfiltration.yml
converted_at: '2026-04-14T22:30:00.000000+00:00'
splunk_saved_search:
  name: 'Detection: AWS Mass Secrets Exfiltration (Smash and Grab)'
  search: >
    index="aws" sourcetype="aws:cloudtrail" (eventName="GetSecretValue" OR eventName="BatchGetSecretValue" OR eventName="GetParameters" OR eventName="GetParameter")
    | fillnull value="none" requestParameters.secretId, requestParameters.name
    | stats count as total_calls, dc(requestParameters.secretId) as unique_secrets, dc(requestParameters.name) as unique_params, values(eventName) as actions by userIdentity.arn, sourceIPAddress, userAgent
    | eval total_unique_stolen = unique_secrets + unique_params
    | where total_unique_stolen > 3 OR total_calls > 20
  cron_schedule: '*/10 * * * *'
  is_scheduled: true
  alert_type: number of events
  alert_threshold: 0
  alert_comparator: greater than
  dispatch_earliest_time: -10m
  dispatch_latest_time: now
