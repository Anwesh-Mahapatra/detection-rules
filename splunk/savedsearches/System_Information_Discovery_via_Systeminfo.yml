rule_title: System Information Discovery via Systeminfo
rule_id: no-id
rule_level: low
mitre_attack:
- attack.discovery
- attack.t1082
description: 'Detects execution of systeminfo.exe, commonly used by APT groups including
  KONNI for host reconnaissance after initial compromise. Alone this is low severity,
  but combined with other kill chain phases it indicates active compromise.

  '
spl_query: index="sysmon" source="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
  EventCode=1 Image="*\\systeminfo.exe"
