rule_title: AWS Secrets Access from Anomalous IP (Low and Slow)
rule_id: aws-cloudtrail-anomalous-secrets-ip
rule_level: high
mitre_attack:
- attack.credential_access
- attack.t1528
- attack.t1078.004
description: Detects an AWS identity accessing Secrets Manager or SSM Parameter Store from an untrusted, external, or non-corporate IP address.
spl_query: >
  index="aws" sourcetype="aws:cloudtrail" (eventName="GetSecretValue" OR eventName="BatchGetSecretValue" OR eventName="GetParameters" OR eventName="GetParameter")
  | search NOT (sourceIPAddress="10.*" OR sourceIPAddress="192.168.*" OR sourceIPAddress="172.16.*" OR sourceIPAddress="*.amazonaws.com" OR sourceIPAddress="AWS Internal")
  | stats count as total_calls, values(eventName) as actions by userIdentity.arn, sourceIPAddress, userAgent
source_sigma_file: rules/AWS/Anomalous_Secrets_Access.yml
converted_at: '2026-04-14T22:30:00.000000+00:00'
splunk_saved_search:
  name: 'Detection: AWS Secrets Access from Anomalous IP'
  search: >
    index="aws" sourcetype="aws:cloudtrail" (eventName="GetSecretValue" OR eventName="BatchGetSecretValue" OR eventName="GetParameters" OR eventName="GetParameter")
    | search NOT (sourceIPAddress="10.*" OR sourceIPAddress="192.168.*" OR sourceIPAddress="172.16.*" OR sourceIPAddress="*.amazonaws.com" OR sourceIPAddress="AWS Internal")
    | stats count as total_calls, values(eventName) as actions by userIdentity.arn, sourceIPAddress, userAgent
  cron_schedule: '*/5 * * * *'
  is_scheduled: true
  alert_type: number of events
  alert_threshold: 0
  alert_comparator: greater than
  dispatch_earliest_time: -5m
  dispatch_latest_time: now